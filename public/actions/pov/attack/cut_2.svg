<svg width="300" height="220" viewBox="0 0 300 220" xmlns="http://www.w3.org/2000/svg">

    <!-- POV: keine Figur, nur eigene Arme + Säbel -->

    <!-- Schulterpunkt (Referenz im Bildzentrum unten) -->
    <circle cx="150" cy="200" r="2" fill="black"/>

    <!-- rechter Oberarm (aus POV Brust nach oben links geführt) -->
    <line x1="150" y1="200" x2="120" y2="150" stroke="black" stroke-width="4"/>

    <!-- rechter Unterarm (weiter hochgeladen für Cut 2 Start) -->
    <line x1="120" y1="150" x2="100" y2="90" stroke="black" stroke-width="4"/>

    <!-- Handgelenk -->
    <circle cx="100" cy="90" r="4" fill="none" stroke="black" stroke-width="2"/>

    <!-- Säbelkorb -->
    <circle cx="100" cy="90" r="6" fill="none" stroke="black" stroke-width="2"/>

    <!-- Säbelklinge (Start Cut 2: links oben → rechts unten, noch am Anfang der Bewegung) -->
    <line x1="100" y1="90" x2="155" y2="125" stroke="black" stroke-width="4"/>

    <!-- leichte Orientierungslinie (Schwungachse, optional) -->
    <line x1="85" y1="70" x2="170" y2="140" stroke="none"/>

</svg>