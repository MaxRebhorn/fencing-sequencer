<svg width="200" height="300" xmlns="http://www.w3.org/2000/svg">

    <!-- Kopf -->
    <circle cx="100" cy="80" r="20" fill="none" stroke="black" stroke-width="3"/>

    <!-- Körper -->
    <line x1="100" y1="100" x2="100" y2="190" stroke="black" stroke-width="3"/>

    <!-- linker Arm (Oberarm + Unterarm) -->
    <line x1="100" y1="120" x2="70" y2="150" stroke="black" stroke-width="3"/>
    <line x1="70" y1="150" x2="60" y2="170" stroke="black" stroke-width="3"/>
    <circle cx="70" cy="150" r="3" fill="none" stroke="black"/>

    <!-- rechter Arm (Quint: Oberarm + Unterarm hochgeführt) -->
    <line x1="100" y1="120" x2="120" y2="85" stroke="black" stroke-width="3"/>
    <circle cx="120" cy="85" r="3" fill="none" stroke="black"/>

    <line x1="120" y1="85" x2="145" y2="35" stroke="black" stroke-width="3"/>
    <circle cx="145" cy="35" r="3" fill="none" stroke="black"/>

    <!-- Beine -->
    <line x1="100" y1="190" x2="80" y2="260" stroke="black" stroke-width="3"/>
    <line x1="100" y1="190" x2="120" y2="260" stroke="black" stroke-width="3"/>

    <!-- Füße -->
    <line x1="80" y1="260" x2="70" y2="260" stroke="black" stroke-width="3"/>
    <line x1="120" y1="260" x2="130" y2="260" stroke="black" stroke-width="3"/>

    <!-- Säbelkorb (Handgelenk rechte Hand) -->
    <circle cx="145" cy="35" r="6" fill="none" stroke="black" stroke-width="2"/>

    <!-- Klinge (Quint: horizontal über Kopf) -->
    <line x1="145" y1="35" x2="35" y2="35" stroke="black" stroke-width="3"/>

</svg>