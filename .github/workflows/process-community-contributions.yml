name: Process Community Contributions

on:
  issue_comment:
    types: [created]

jobs:
  process_contribution:
    if: contains(github.event.comment.body, '/approve')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install svgo

      - name: Run issue processing script
        id: process_script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_AUTHOR_ASSOCIATION: ${{ github.event.comment.author_association }}
        run: node scripts/process-issue.js

      - name: Create Comment
        if: always() && steps.process_script.outputs.comment_message
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `${{ steps.process_script.outputs.comment_message }}`
            });
